server {
    listen 80;
    server_name hoopci.ci www.hoopci.ci;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name hoopci.ci www.hoopci.ci;

    ssl_certificate     /etc/letsencrypt/live/hoopci.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hoopci.ci/privkey.pem;

    client_max_body_size 10M;

    # Sécurité (Django ajoute aussi HSTS sur ses propres réponses)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml application/manifest+json;

    root /var/www/hoopci/frontend/dist;

    # Assets fingerprintés par Vite (index-Bp8A3843.js…) : cache long
    location /assets/ {
        expires 1y;
        try_files $uri =404;
    }

    # PWA : service worker et manifest toujours re-validés, sinon les mises à jour
    # de l'app ne parviennent jamais aux utilisateurs
    location = /sw.js { expires -1; }
    location = /manifest.webmanifest { expires -1; }

    # React PWA (SPA) — index.html re-validé à chaque visite
    location / {
        expires -1;
        try_files $uri $uri/ /index.html;
    }

    # API Django
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin Django
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Fichiers médias Django (affiches, photos)
    location /media/ {
        alias /var/www/hoopci/backend/media/;
        expires 30d;
    }

    # Fichiers statiques Django (admin)
    location /static/ {
        alias /var/www/hoopci/backend/staticfiles/;
        expires 30d;
    }
}
