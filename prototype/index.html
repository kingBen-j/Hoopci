<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0D0D0D">
<title>HoopCI — La plateforme du street basket ivoirien</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,500;0,600;0,700;0,800;1,600;1,700;1,800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   HoopCI — Prototype v1.1 · Design inspiré FIBA 3x3
   Couleurs : drapeau de Côte d'Ivoire
   Orange #F87306 (logo) · Blanc #FFFFFF · Vert #009E60
   ============================================================ */
:root{
  --orange:#F87306;
  --orange-dark:#C55A02;
  --green:#009E60;
  --green-dark:#007447;
  --white:#FFFFFF;
  --black:#0D0D0D;
  --bg:#111111;
  --card:#1A1A1A;
  --card2:#212121;
  --line:#2C2C2C;
  --txt:#F4F4F4;
  --muted:#9A9A9A;
  --red:#E23B3B;
  --yellow:#F2B705;
  --cond:'Barlow Condensed', 'Arial Narrow', Impact, sans-serif;
  --body:'Barlow', Arial, sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{
  font-family:var(--body);
  background:#000;
  color:var(--txt);
  font-size:15px;
  line-height:1.45;
}
/* Cadre téléphone (mobile-first, centré sur desktop) */
.phone{
  max-width:430px;margin:0 auto;min-height:100dvh;
  background:var(--bg);position:relative;
  box-shadow:0 0 60px rgba(248,115,6,.12);
  overflow-x:hidden;
}
main{padding-bottom:86px;min-height:calc(100dvh - 56px)}

/* ---------- Typo FIBA 3x3 : condensé, italique, majuscules ---------- */
h1,h2,h3,.display{
  font-family:var(--cond);text-transform:uppercase;
  font-style:italic;font-weight:800;letter-spacing:.2px;line-height:1.02;
}
.section-title{
  display:flex;align-items:center;gap:10px;
  font-family:var(--cond);font-style:italic;font-weight:800;
  text-transform:uppercase;font-size:22px;margin:22px 16px 12px;
}
.section-title::after{content:'';flex:1;height:3px;
  background:linear-gradient(90deg,var(--orange) 33%,var(--white) 33% 66%,var(--green) 66%);}

/* Bandeau tricolore CIV — signature graphique */
.tricolor{height:4px;background:linear-gradient(90deg,var(--orange) 33.3%,var(--white) 33.3% 66.6%,var(--green) 66.6%)}

/* Éléments inclinés (skew) façon 3x3 */
.skew{transform:skewX(-10deg)}
.skew>*{transform:skewX(10deg);display:inline-block}

/* ---------- Barre supérieure ---------- */
.topbar{
  position:sticky;top:0;z-index:50;height:56px;
  background:var(--black);border-bottom:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 12px;
}
.brand{display:flex;align-items:center;gap:9px;cursor:pointer}
.logo-plate{
  background:var(--white);transform:skewX(-10deg);
  padding:3px 8px;border-radius:2px;box-shadow:2px 2px 0 var(--orange);
}
.logo-plate img{height:32px;display:block;transform:skewX(10deg)}
.brand b{
  font-family:var(--cond);font-style:italic;font-weight:800;font-size:24px;
  text-transform:uppercase;letter-spacing:.5px;
}
.brand b span{color:var(--orange)}
.brand b .ci{color:var(--green)}
.top-actions{display:flex;align-items:center;gap:6px}
.icon-btn{
  position:relative;width:40px;height:40px;border:1px solid var(--line);
  background:var(--card);color:var(--txt);border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;
}
.badge-dot{
  position:absolute;top:6px;right:6px;min-width:16px;height:16px;
  background:var(--orange);color:#fff;border-radius:8px;
  font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
  padding:0 4px;
}

/* ---------- Héro (accueil) ---------- */
.hero{
  position:relative;padding:26px 16px 34px;
  background:
    radial-gradient(120% 90% at 85% 0%, rgba(248,115,6,.28), transparent 55%),
    radial-gradient(100% 80% at 0% 100%, rgba(0,158,96,.22), transparent 55%),
    var(--black);
  clip-path:polygon(0 0,100% 0,100% 92%,0 100%);
  border-bottom:none;
}
.hero .kicker{
  display:inline-block;background:var(--green);color:#fff;
  font-family:var(--cond);font-style:italic;font-weight:700;font-size:13px;
  text-transform:uppercase;letter-spacing:1.5px;padding:4px 12px;
  transform:skewX(-10deg);margin-bottom:12px;
}
.hero h1{font-size:42px}
.hero h1 .o{color:var(--orange)}
.hero p{color:var(--muted);margin:10px 0 16px;max-width:320px;font-size:14px}
.hero .cta-row{display:flex;gap:10px}

/* ---------- Boutons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  font-family:var(--cond);font-style:italic;font-weight:700;font-size:17px;
  text-transform:uppercase;letter-spacing:.8px;
  padding:11px 20px;border:none;cursor:pointer;color:#fff;
  background:var(--orange);transform:skewX(-10deg);
  box-shadow:3px 3px 0 rgba(255,255,255,.18);
  transition:filter .15s, transform .1s;
}
.btn>span{display:inline-block;transform:skewX(10deg)}
.btn:active{transform:skewX(-10deg) translateY(2px);box-shadow:1px 1px 0 rgba(255,255,255,.18)}
.btn.green{background:var(--green)}
.btn.ghost{background:transparent;border:2px solid var(--white);box-shadow:none}
.btn.dark{background:var(--card2);border:1px solid var(--line);box-shadow:none}
.btn.red{background:var(--red)}
.btn.block{display:flex;width:calc(100% - 8px);margin:0 auto}
.btn.sm{font-size:14px;padding:7px 14px}

/* ---------- Filtres ---------- */
.filters{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 4px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
select.chip, .chip{
  flex-shrink:0;appearance:none;background:var(--card);color:var(--txt);
  border:1px solid var(--line);border-radius:0;
  font-family:var(--cond);font-weight:600;font-size:15px;text-transform:uppercase;
  padding:8px 14px;cursor:pointer;transform:skewX(-10deg);
}
.chip.active{background:var(--orange);border-color:var(--orange);color:#fff}
.seg{display:flex;gap:0;margin:6px 0}
.seg button{
  flex:1;padding:10px 6px;background:var(--card);border:1px solid var(--line);
  color:var(--muted);font-family:var(--cond);font-weight:700;font-size:16px;
  text-transform:uppercase;font-style:italic;cursor:pointer;
}
.seg button.active{background:var(--orange);color:#fff;border-color:var(--orange)}

/* ---------- Cartes tournoi ---------- */
.cards{display:flex;flex-direction:column;gap:14px;padding:10px 16px}
.t-card{
  background:var(--card);border:1px solid var(--line);cursor:pointer;
  overflow:hidden;position:relative;
}
.t-cover{
  height:120px;position:relative;display:flex;align-items:flex-end;
  padding:12px;overflow:hidden;
}
.t-cover .big{
  position:absolute;right:-6px;top:-14px;
  font-family:var(--cond);font-style:italic;font-weight:800;font-size:92px;
  color:rgba(255,255,255,.10);text-transform:uppercase;white-space:nowrap;
}
.t-cover h3{font-size:26px;position:relative;text-shadow:0 2px 8px rgba(0,0,0,.5)}
.g1{background:linear-gradient(120deg,#7A3A00 0%,var(--orange) 100%)}
.g2{background:linear-gradient(120deg,#00331F 0%,var(--green) 100%)}
.g3{background:linear-gradient(120deg,#232323 0%,#5A5A5A 100%)}
.g4{background:linear-gradient(120deg,#4A1D00 0%,#A34E00 100%)}
.g5{background:linear-gradient(120deg,#013A26 0%,#02734A 100%)}
.t-body{padding:12px;display:flex;flex-direction:column;gap:8px}
.t-meta{display:flex;flex-wrap:wrap;gap:6px 14px;color:var(--muted);font-size:13px}
.t-meta b{color:var(--txt);font-weight:600}
.t-foot{display:flex;align-items:center;justify-content:space-between;border-top:1px dashed var(--line);padding-top:10px}
.price{font-family:var(--cond);font-style:italic;font-weight:800;font-size:19px;color:var(--orange)}
.price small{color:var(--muted);font-size:12px;font-style:normal;font-family:var(--body);font-weight:400}

/* Badges de statut */
.status{
  display:inline-block;font-family:var(--cond);font-style:italic;font-weight:700;
  font-size:12.5px;text-transform:uppercase;letter-spacing:.8px;
  padding:3px 10px;transform:skewX(-10deg);color:#fff;
}
.status>span{display:inline-block;transform:skewX(10deg)}
.st-ouvert{background:var(--green)}
.st-complet{background:var(--yellow);color:#111}
.st-en_cours{background:var(--orange)}
.st-termine{background:#4A4A4A}
.st-annule{background:var(--red)}
.fmt{
  display:inline-block;font-family:var(--cond);font-weight:800;font-style:italic;
  font-size:13px;border:1.5px solid var(--orange);color:var(--orange);
  padding:2px 8px;transform:skewX(-10deg)
}
.fav{
  position:absolute;top:10px;right:10px;z-index:2;width:36px;height:36px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.25);
  color:#fff;font-size:17px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.fav.on{color:var(--orange);border-color:var(--orange)}

/* ---------- Sponsors ---------- */
.sponsors{display:flex;gap:10px;overflow-x:auto;padding:6px 16px 22px;scrollbar-width:none}
.sponsors::-webkit-scrollbar{display:none}
.sponsor{
  flex-shrink:0;background:var(--card);border:1px dashed var(--line);
  color:var(--muted);font-family:var(--cond);font-style:italic;font-weight:700;
  text-transform:uppercase;font-size:15px;padding:16px 22px;transform:skewX(-10deg);
}
.sponsor>span{display:inline-block;transform:skewX(10deg)}

/* ---------- Détail tournoi ---------- */
.detail-cover{height:190px;position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:16px;clip-path:polygon(0 0,100% 0,100% 90%,0 100%)}
.detail-cover h2{font-size:34px;text-shadow:0 2px 10px rgba(0,0,0,.6)}
.back{
  position:absolute;top:12px;left:12px;z-index:3;width:38px;height:38px;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.3);color:#fff;
  border-radius:50%;font-size:18px;cursor:pointer;
}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 16px}
.info-tile{background:var(--card);border:1px solid var(--line);padding:10px 12px}
.info-tile .lbl{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:2px}
.info-tile .val{font-family:var(--cond);font-weight:700;font-size:18px;font-style:italic}
.panel{background:var(--card);border:1px solid var(--line);margin:8px 16px;padding:14px}
.panel h3{font-size:19px;margin-bottom:8px;color:var(--orange)}
.map-ph{
  height:130px;margin:8px 16px;border:1px dashed var(--line);
  background:
    linear-gradient(rgba(0,158,96,.06),rgba(0,158,96,.06)),
    repeating-linear-gradient(0deg,transparent,transparent 19px,var(--line) 20px),
    repeating-linear-gradient(90deg,transparent,transparent 19px,var(--line) 20px),
    var(--card);
  display:flex;align-items:center;justify-content:center;color:var(--muted);
  font-size:13px;position:relative;
}
.pin{position:absolute;font-size:26px;filter:drop-shadow(0 3px 4px rgba(0,0,0,.5))}
.progress{height:8px;background:var(--card2);border:1px solid var(--line);margin-top:6px}
.progress i{display:block;height:100%;background:var(--green)}

/* ---------- Classement / résultats ---------- */
.rank-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line)}
.rank-row:last-child{border-bottom:none}
.rank-num{
  width:34px;height:34px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--cond);font-style:italic;font-weight:800;font-size:18px;
  background:var(--card2);border:1px solid var(--line);transform:skewX(-10deg);
}
.rank-num>span{transform:skewX(10deg)}
.rank-1 .rank-num{background:var(--orange);border-color:var(--orange)}
.rank-2 .rank-num{background:#5A5A5A}
.rank-3 .rank-num{background:#3A2A18}
.mvp-band{
  margin-top:12px;background:linear-gradient(90deg,rgba(248,115,6,.18),transparent);
  border-left:4px solid var(--orange);padding:10px 12px;display:flex;align-items:center;gap:12px;
}

/* ---------- Joueurs ---------- */
.p-card{
  display:flex;gap:12px;background:var(--card);border:1px solid var(--line);
  padding:12px;cursor:pointer;position:relative;overflow:hidden;
}
.p-card.boost{border-color:var(--orange);box-shadow:inset 0 0 0 1px var(--orange)}
.boost-tag{
  position:absolute;top:0;right:0;background:var(--orange);color:#fff;
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  padding:3px 8px;
}
.avatar{
  width:58px;height:58px;flex-shrink:0;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--cond);font-style:italic;font-weight:800;font-size:21px;color:#fff;
  background:linear-gradient(135deg,var(--orange),var(--orange-dark));
  border:2px solid rgba(255,255,255,.25);
}
.avatar.grn{background:linear-gradient(135deg,var(--green),var(--green-dark))}
.avatar.dark{background:#333}
.avatar.lg{width:86px;height:86px;font-size:30px}
.p-main{flex:1;min-width:0}
.p-name{font-family:var(--cond);font-style:italic;font-weight:800;font-size:19px;text-transform:uppercase;display:flex;align-items:center;gap:6px}
.vbadge{color:var(--green);font-size:15px}
.p-sub{color:var(--muted);font-size:12.5px;margin:1px 0 7px}
.winbar{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
.winbar .bar{flex:1;height:6px;background:var(--card2);border:1px solid var(--line)}
.winbar .bar i{display:block;height:100%;background:var(--green)}
.winbar b{color:var(--green);font-family:var(--cond);font-size:15px;font-style:italic}
.dispo-pill{
  display:inline-block;font-size:10.5px;font-weight:700;text-transform:uppercase;
  letter-spacing:.8px;padding:2px 8px;border-radius:10px;
  background:rgba(0,158,96,.15);color:var(--green);border:1px solid var(--green);
}
.restreint{
  background:rgba(255,255,255,.05);border:1px dashed var(--line);
  color:var(--muted);font-size:11px;padding:2px 8px;border-radius:10px;
}

/* Profil public */
.profile-head{
  position:relative;padding:24px 16px 18px;
  background:
    radial-gradient(100% 100% at 100% 0%, rgba(0,158,96,.25), transparent 60%),
    radial-gradient(100% 100% at 0% 100%, rgba(248,115,6,.25), transparent 60%),
    var(--black);
  clip-path:polygon(0 0,100% 0,100% 88%,0 100%);
  display:flex;gap:14px;align-items:center;
}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 4px}
.stat{
  background:var(--card);border:1px solid var(--line);text-align:center;padding:12px 4px;
  position:relative;overflow:hidden;
}
.stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--orange)}
.stat:nth-child(2)::before{background:var(--white)}
.stat:nth-child(3)::before{background:var(--green)}
.stat:nth-child(4)::before{background:var(--yellow)}
.stat b{font-family:var(--cond);font-style:italic;font-weight:800;font-size:26px;display:block}
.stat span{font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)}

/* ---------- Formulaires ---------- */
.form{display:flex;flex-direction:column;gap:13px;padding:16px}
.field label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:1.2px;color:var(--muted);margin-bottom:5px;font-weight:600}
.field input,.field select,.field textarea{
  width:100%;background:var(--card);border:1px solid var(--line);color:var(--txt);
  padding:12px;font-family:var(--body);font-size:15px;outline:none;
}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--orange)}
.field textarea{resize:vertical;min-height:70px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.role-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.role-card{
  background:var(--card);border:1px solid var(--line);padding:14px 6px;text-align:center;
  cursor:pointer;transition:border-color .15s;
}
.role-card .ic{font-size:24px;display:block;margin-bottom:6px}
.role-card b{font-family:var(--cond);font-style:italic;text-transform:uppercase;font-size:15px}
.role-card p{font-size:10px;color:var(--muted);margin-top:3px}
.role-card.active{border-color:var(--orange);background:rgba(248,115,6,.1)}
.alert{
  border-left:4px solid var(--yellow);background:rgba(242,183,5,.08);
  padding:12px;font-size:13px;color:#E8D9A8;
}
.alert.green{border-color:var(--green);background:rgba(0,158,96,.08);color:#A8D9C4}
.check{display:flex;gap:10px;align-items:flex-start;font-size:13px;color:var(--muted);cursor:pointer}
.check input{width:18px;height:18px;accent-color:var(--orange);flex-shrink:0;margin-top:1px}
.tabs{display:flex;border-bottom:2px solid var(--line);margin:0 16px}
.tabs button{
  flex:1;background:none;border:none;color:var(--muted);padding:13px 4px;cursor:pointer;
  font-family:var(--cond);font-style:italic;font-weight:700;font-size:18px;text-transform:uppercase;
  border-bottom:3px solid transparent;margin-bottom:-2px;
}
.tabs button.active{color:var(--orange);border-bottom-color:var(--orange)}

/* ---------- Offres / notifications ---------- */
.o-card{background:var(--card);border:1px solid var(--line);padding:13px;display:flex;flex-direction:column;gap:9px}
.o-head{display:flex;justify-content:space-between;align-items:center;gap:8px}
.o-msg{font-size:13.5px;color:#CFCFCF;border-left:3px solid var(--line);padding-left:10px}
.o-actions{display:flex;gap:10px}
.n-item{
  display:flex;gap:12px;padding:13px 16px;border-bottom:1px solid var(--line);cursor:pointer;
  align-items:flex-start;
}
.n-item.unread{background:rgba(248,115,6,.06);border-left:3px solid var(--orange)}
.n-ic{
  width:38px;height:38px;flex-shrink:0;border-radius:8px;background:var(--card2);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:17px;
}
.n-item p{font-size:13.5px}
.n-item time{font-size:11px;color:var(--muted)}

/* ---------- Navigation basse ---------- */
.bottomnav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;z-index:60;
  background:var(--black);border-top:1px solid var(--line);
  display:grid;grid-template-columns:repeat(5,1fr);
  padding:6px 4px calc(8px + env(safe-area-inset-bottom));
}
.nav-btn{
  background:none;border:none;color:var(--muted);cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;
  font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;
  font-family:var(--body);
}
.nav-btn .ni{font-size:19px}
.nav-btn.active{color:var(--orange)}
.nav-btn.create .ni{
  width:44px;height:44px;margin-top:-22px;background:var(--orange);color:#fff;
  border-radius:4px;transform:skewX(-10deg) rotate(0deg);
  display:flex;align-items:center;justify-content:center;font-size:26px;
  box-shadow:0 4px 14px rgba(248,115,6,.5), 3px 3px 0 rgba(0,158,96,.9);
}

/* ---------- Menu écrans (prototype) ---------- */
.overlay{
  position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.8);
  display:none;align-items:flex-end;justify-content:center;
}
.overlay.open{display:flex}
.sheet{
  width:100%;max-width:430px;background:var(--card);border-top:4px solid var(--orange);
  max-height:80dvh;overflow-y:auto;padding:18px 16px 30px;
}
.sheet h3{font-size:22px;margin-bottom:4px}
.sheet p.hint{color:var(--muted);font-size:12px;margin-bottom:14px}
.sheet-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sheet-grid button{
  background:var(--card2);border:1px solid var(--line);color:var(--txt);
  padding:13px 8px;cursor:pointer;text-align:left;
  font-family:var(--cond);font-style:italic;font-weight:700;font-size:15px;text-transform:uppercase;
}
.sheet-grid button:active{border-color:var(--orange)}

/* ---------- Toast ---------- */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) skewX(-10deg);
  background:var(--green);color:#fff;padding:11px 20px;z-index:200;
  font-family:var(--cond);font-style:italic;font-weight:700;font-size:16px;
  text-transform:uppercase;letter-spacing:.5px;box-shadow:0 6px 20px rgba(0,0,0,.5);
  opacity:0;pointer-events:none;transition:opacity .25s;white-space:nowrap;max-width:92%;

/* ---------- Utilitaires ---------- */

const fcfa = n => n === 0 ? 'Gratuit' : n.toLocaleString('fr-FR') + ' FCFA';
const esc = s => s.replace(/</g,'&lt;');

function toast(msg, orange){
  const t = $('toast');
  $('toastMsg').innerHTML = msg;
  t.classList.toggle('orange', !!orange);
  t.classList.add('show');
  clearTimeout(t._h);
  t._h = setTimeout(()=>t.classList.remove('show'), 2600);
}
function toggleMenu(open){ $('menu').classList.toggle('open', open); }
function statusBadge(s){ return `<span class="status st-${s}"><span>${STATUTS[s]}</span></span>`; }
function updateNotifBadge(){

}

/* ---------- Navigation ---------- */
function go(view, param){
  currentView = view;
  const v = VIEWS[view];
  $('view').innerHTML = typeof v === 'function' ? v(param) : v;
  window.scrollTo({top:0});
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.nav === view);
  });
  updateNotifBadge();
}

const VIEWS = {};

/* ---------- Accueil ---------- */
VIEWS.home = () => {

function tournoiCard(t){

    <button class="fav ${fav?'on':''}" onclick="event.stopPropagation();toggleFav(${t.id})" aria-label="Favori">${fav?'★':'☆'}</button>

      <span class="big">${t.format}</span>
      <h3>${t.titre}</h3>
    </div>
    <div class="t-body">
      <div style="display:flex;gap:8px;align-items:center">
        ${statusBadge(t.statut)}
        <span class="fmt">${t.format}</span>
        <span class="muted" style="font-size:12px">${t.niveau}</span>
      </div>
      <div class="t-meta">
        <span>📍 <b>${t.commune}</b></span>
        <span>📅 <b>${t.date}</b></span>

}

function toggleFav(id){
  if(favoris.has(id)){ favoris.delete(id); toast('Retiré des favoris', true); }
  else { favoris.add(id); toast('⭐ Tournoi ajouté aux favoris'); }

}

/* ---------- Détail tournoi ---------- */

    <div class="mt" style="font-size:13px">

    </div>
  </div>

  <div class="panel">
    <h3>Lieu</h3>
    <p style="font-size:13.5px">${t.lieu}, ${t.commune}</p>
  </div>

  ${t.statut==='termine' ? classementBlock(t) : ''}

  <div class="panel">

      <div class="avatar grn">${t.organisateur.split(' ').map(w=>w[0]).join('').slice(0,2)}</div>

      : ''}

  </div>
  ${protoFooter()}`;
};

function classementBlock(t){
  return `
  <div class="panel">
    <h3>🏆 Classement final</h3>
    ${t.classement.map(c=>`
      <div class="rank-row rank-${c.rang}">
        <div class="rank-num"><span>${c.rang}</span></div>
        <b style="font-family:var(--cond);font-style:italic;font-size:17px;text-transform:uppercase">${c.equipe}</b>

function inscrireEquipe(id){
  const t = TOURNOIS.find(x=>x.id===id);
  t.equipes = Math.min(t.equipes+1, t.max);
  if(t.equipes===t.max) t.statut='complet';
  toast('✅ Équipe inscrite au tournoi !');
  go('detail', id);
}

function checkMinor(val){
  if(!val) return;
  const age = (Date.now() - new Date(val).getTime()) / 3.15576e10;
  $('minorBlock').style.display = age < 18 ? 'block' : 'none';
}
function registerSubmit(){
  const mb = $('minorBlock');
  if(mb && mb.style.display==='block' && !$('consent').checked){
    toast('⚠️ Parcours de consentement parental requis', true); return;
  }
  toast('✅ Compte créé — bienvenue sur HoopCI !');
  go(authRole==='organisateur' ? 'dashboard' : 'home');
}

        <div class="o-actions">
